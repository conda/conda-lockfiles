# edit this in https://github.com/conda/infrastructure

name: Bug Report
description: Create a bug report.
labels:
  - type::bug
body:
  - type: markdown
    attributes:
      value: |
        Because processing new bug reports is time-consuming, we would like to ask you to fill out the following form to the best of your ability and as completely as possible.

        > [!NOTE]
        > Bug reports that are incomplete or missing information may be closed as inactionable.

        Since there are already a lot of open issues, please also take a moment to search existing ones to see if your bug has already been reported. If you find something related, please upvote that issue and provide additional details as necessary.

        💐 Thank you for helping to make `conda/conda-lockfiles` better. We would be unable to improve `conda/conda-lockfiles` without our community!
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Please confirm and check all of the following options.
      options:
        - label: I added a descriptive title
          required: true
        - label: I searched open reports and couldn't find a duplicate
          required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What should have happened instead? Please provide as many details as possible. The more information provided, the more likely we are able to replicate your problem and offer a solution.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Please provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Create environment with `conda create -n test-env --env-spec=conda-lock-v1 --file=path/to/lockfile.yml`
        2. Try to export with `conda export -n test-env --format=conda-lock-v1`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: conda-info
    attributes:
      label: conda info
      description: Please run `conda info` and paste the output here.
      render: shell
    validations:
      required: true
  - type: textarea
    id: conda-list
    attributes:
      label: conda list --show-channel-urls
      description: Please run `conda list --show-channel-urls` and paste the output here.
      render: shell
    validations:
      required: true
  - type: textarea
    id: lockfile
    attributes:
      label: Lockfile Information
      description: If the issue is related to a specific lockfile, please provide relevant details.
      placeholder: Lockfile format, lockfile contents, etc.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Include any additional information (or screenshots) that you think would be valuable.
